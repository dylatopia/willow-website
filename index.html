"Rendi M.",rating:5,comment:"Sulit dipercaya ini ditulis tahun 1813. Relevansinya masih terasa hingga hari ini. Austen adalah jenius.",date:"2024-08-05",avatar:"R"}]},{id:"the-great-gatsby",title:"The Great Gatsby",author:"F. Scott Fitzgerald",genre:"Classic",coverColor:"#2D5A3D",coverAccent:"#D4AF6A",coverEmoji:"✨",price:79e3,borrowPrice:12e3,rating:4.5,totalReviews:287,year:1925,pages:180,stock:5,available:!0,availableForBorrow:!0,synopsis:"Diceritakan melalui mata Nick Carraway, The Great Gatsby mengisahkan Jay Gatsby yang misterius dan kekayaannya yang tak terbatas — semuanya dibangun demi satu impian: merebut kembali cinta masa lalunya, Daisy Buchanan. Sebuah kisah tentang Mimpi Amerika, obsesi, dan kehampaan di balik glamour dan kemewahan era Jazz 1920-an.",reviews:[{id:"r5",reviewer:"Lina S.",rating:5,comment:"Prosa Fitzgerald begitu puitis. Setiap kalimat terasa seperti lukisan. Salah satu buku terbaik yang pernah kubaca.",date:"2024-11-01",avatar:"L"},{id:"r6",reviewer:"Dimas P.",rating:4,comment:"Sangat ikonik dan penuh makna tersembunyi. Simbolisme lampu hijau itu masih membuatku tertegun setiap kali mengingatnya.",date:"2024-10-10",avatar:"D"},{id:"r7",reviewer:"Nadia K.",rating:4,comment:"Agak sedih di akhirnya, tapi memang itulah yang membuatnya hebat. Kritik terhadap masyarakat kelas atas Amerika sangat tajam.",date:"2024-09-25",avatar:"N"}]},{id:"nineteen-eighty-four",title:"1984",author:"George Orwell",genre:"Classic",coverColor:"#3D3D3D",coverAccent:"#C1714B",coverEmoji:"👁",price:85e3,borrowPrice:13e3,rating:4.7,totalReviews:421,year:1949,pages:328,stock:10,available:!0,availableForBorrow:!0,synopsis:"Di negara totaliter Oceania, Winston Smith bekerja untuk Kementerian Kebenaran yang bertugas memalsukan sejarah. Di bawah pengawasan Big Brother yang tak henti, Winston diam-diam memberontak dan jatuh cinta pada Julia. Karya Orwell ini menjadi peringatan keras tentang bahaya totalitarisme, pengawasan massal, dan manipulasi kebenaran — yang ironisnya semakin relevan di era digital.",reviews:[{id:"r8",reviewer:"Fajar R.",rating:5,comment:"Buku yang mengubah cara pandangku terhadap kebebasan. Dystopia yang terasa sangat nyata dan menakutkan. Wajib dibaca semua orang.",date:"2024-11-20",avatar:"F"},{id:"r9",reviewer:"Mega T.",rating:5,comment:"Setelah baca ini, aku tidak bisa lagi melihat media sosial dengan cara yang sama. Sangat provokatif dalam makna terbaik.",date:"2024-10-05",avatar:"M"},{id:"r10",reviewer:"Yudi A.",rating:4,comment:"Berat tapi penting. Bagian Newspeak dan doublethink adalah yang paling menakjubkan dari segi konsep.",date:"2024-09-12",avatar:"Y"}]},{id:"norwegian-wood",title:"Norwegian Wood",author:"Haruki Murakami",genre:"Japanese Lit",coverColor:"#7B5E3A",coverAccent:"#A8C5A0",coverEmoji:"🎵",price:95e3,borrowPrice:15e3,rating:4.6,totalReviews:389,year:1987,pages:296,stock:6,available:!0,availableForBorrow:!0,synopsis:"Toru Watanabe, mahasiswa Tokyo di akhir 1960-an, terjebak di antara dua wanita yang sangat berbeda: Naoko yang rapuh dan penuh kesedihan, dan Midori yang hidup dan penuh semangat. Novel ini adalah perjalanan melankolis tentang kehilangan, ingatan, seksualitas, dan kesehatan mental — dibungkus dalam prosa Murakami yang khas dan atmosfer Jepang yang kuat.",reviews:[{id:"r11",reviewer:"Risa F.",rating:5,comment:"Murakami berhasil membuat hatiku hancur dengan cara yang paling indah. Norwegian Wood adalah tentang kerinduan yang tidak bisa dijelaskan.",date:"2024-11-08",avatar:"R"},{id:"r12",reviewer:"Andi W.",rating:5,comment:"Salah satu novel paling melankolis yang pernah kubaca. Setiap halaman terasa seperti mimpi sedih yang indah.",date:"2024-10-18",avatar:"A"},{id:"r13",reviewer:"Tari D.",rating:4,comment:"Bukan untuk semua orang, tapi jika kamu siap untuk perasaan yang intens, buku ini luar biasa.",date:"2024-09-30",avatar:"T"},{id:"r14",reviewer:"Bram S.",rating:5,comment:"Lagu Beatles dan novel ini tidak akan pernah bisa kupisahkan lagi. Murakami itu seniman dalam bertutur.",d
